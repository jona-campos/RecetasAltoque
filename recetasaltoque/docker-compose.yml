version: '3.8'

services:
  libretranslate:
    image: libretranslate/libretranslate
    container_name: libretranslate
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=es,en
    volumes:
      - libretranslate_data:/app/db
    restart: unless-stopped

volumes:
  libretranslate_data:
